<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巨型 AR 地毯踏踏樂 - 實戰運行版</title>
    
    <!-- 引入 TensorFlow.js 核心與 Pose-Detection 模型（不依賴外部伺服器載入權重，直接在瀏覽器高效執行） -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.2.0/dist/tf-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.2.0/dist/tf-converter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.2.0/dist/tf-backend-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background: #0d0e15;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1c29 0%, #0d0e15 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        .title-container {
            margin-bottom: 30px;
        }

        .title-container h1 {
            font-size: 2.5rem;
            color: #00f0ff;
            margin: 0 0 10px 0;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
            letter-spacing: 2px;
        }

        .title-container p {
            font-size: 1.1rem;
            color: #a0a5c0;
            margin: 0;
        }

        .instructions {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            max-width: 500px;
            margin-bottom: 40px;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .instructions ol {
            margin: 0;
            padding-left: 20px;
        }

        .instructions li {
            margin-bottom: 12px;
            color: #e2e4ed;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .start-btn {
            background: linear-gradient(135deg, #ff007f 0%, #7900ff 100%);
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(255, 0, 127, 0.7);
        }

        .start-btn:disabled {
            background: #4a4d61;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #status-text {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #ff007f;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: none;
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        video {
            display: none;
        }

        canvas {
            height: 100%;
            width: 100%;
            object-fit: contain;
            transform: scaleX(-1); /* 鏡像畫面 */
        }

        #hud {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(13, 14, 21, 0.85);
            border-radius: 30px;
            padding: 12px 30px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            backdrop-filter: blur(10px);
            pointer-events: none;
            text-align: center;
            z-index: 10;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        #hud p {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: #fff;
        }

        #hud span {
            color: #ff007f;
            font-weight: bold;
        }

        #calibration-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 8px solid rgba(0, 240, 255, 0.3);
            pointer-events: none;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .guide-box {
            width: 60%;
            height: 80%;
            border: 3px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <!-- 歡迎與授權畫面 -->
    <div id="welcome-screen">
        <div class="title-container">
            <h1>🎹 巨型 AR 地毯踏踏樂</h1>
            <p>跨世代全身互動體感訓練系統</p>
        </div>
        
        <div class="instructions">
            <ol>
                <li>點擊下方按鈕，並<b>允許相機/鏡頭存取權限</b>。</li>
                <li>把手機或電腦放遠（例如放在電視櫃或桌上）。</li>
                <li><b>向後退約 2 米</b>，讓螢幕能看到您的<b>全身上下（包含雙腳）</b>。</li>
                <li>畫面底部會出現三個藍色格子，用腳踩踏格子即可發出 <b>Do、Re、Mi</b> 的琴音！</li>
            </ol>
        </div>

        <button id="btn-start" class="start-btn">進入 AR 互動空間</button>
        <div id="status-text">系統準備就緒。點擊按鈕後將載入本地 AI 引擎。</div>
    </div>

    <!-- 遊戲主畫面 -->
    <div id="game-container">
        <div id="hud">
            <p>🏃‍♂️ 請後退至全身入鏡 • 雙腳踩踏下方方格發聲</p>
        </div>
        
        <div id="calibration-overlay">
            <div class="guide-box">請將全身保持在畫面中央</div>
        </div>

        <div id="canvas-wrapper">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="output-canvas"></canvas>
        </div>
    </div>

    <script>
        const btnStart = document.getElementById('btn-start');
        const welcomeScreen = document.getElementById('welcome-screen');
        const gameContainer = document.getElementById('game-container');
        const statusText = document.getElementById('status-text');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');

        let detector;
        let audioCtx;
        let zoneStates = [false, false, false];
        const frequencies = [261.63, 293.66, 329.63]; // C4, D4, E4 (Do, Re, Mi)
        let isRunning = false;

        // 音訊初始化與播放函數
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(freq) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle'; // 採用更柔和飽滿的三角波，比正弦波更像電子琴
            osc.frequency.value = freq;
            
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            // 漸弱釋放音，製造出自然的踩踏音效
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        // 核心啟動按鈕異步流程
        btnStart.addEventListener('click', async () => {
            btnStart.disabled = true;
            statusText.innerText = '⚡ 正在啟動鏡頭並初始化 AI 骨骼識別引擎...';
            
            try {
                // 1. 初始化音訊（瀏覽器要求必須由使用者點擊觸發）
                initAudio();

                // 2. 獲取相機權限與視訊串流
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: "user" // 使用前置鏡頭
                    },
                    audio: false
                });
                video.srcObject = stream;
                
                // 等待影片元數據載入完畢
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => { resolve(video); };
                });
                video.play();

                // 3. 載入 TensorFlow.js Pose-Detection 模型 (BlazePose 適合單人全身精準追蹤)
                statusText.innerText = '⚙️ 正在加載模型算法（首次加載約需 5-10 秒）...';
                const model = poseDetection.SupportedModels.BlazePose;
                const detectorConfig = {
                    runtime: 'tfjs',
                    enableSmoothing: true,
                    modelType: 'full'
                };
                detector = await poseDetection.createDetector(model, detectorConfig);

                // 4. 切換介面並開始運行主循環
                welcomeScreen.style.display = 'none';
                gameContainer.style.display = 'block';
                isRunning = true;
                
                // 根據視訊實際比例調整畫布解析度
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                requestAnimationFrame(renderLoop);

            } catch (err) {
                console.error(err);
                btnStart.disabled = false;
                statusText.innerText = '❌ 啟動失敗：請確保已允許相機存取權限，或更換支援 WebGL 的瀏覽器再試。';
            }
        });

        // 遊戲核心渲染與體感碰撞檢測循環
        async function renderLoop() {
            if (!isRunning) return;

            // 1. 繪製原始相機畫面
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 定義地毯區域 (畫面底部 25%)
            const zoneWidth = canvas.width / 3;
            const zoneHeight = canvas.height * 0.25;
            const zoneY = canvas.height - zoneHeight;
            
            let activeZonesThisFrame = [false, false, false];

            // 2. 透過 AI 進行人體姿態偵測
            if (detector) {
                try {
                    const poses = await detector.estimatePoses(video, {
                        flipHorizontal: false, // 畫布本身已在 CSS 進行鏡像反轉，這裡保持 false
                        maxPoses: 1
                    });

                    if (poses && poses.length > 0) {
                        const keypoints = poses[0].keypoints;
                        
                        // 提取左腳踝 (left_ankle) 與 右腳踝 (right_ankle)
                        // BlazePose 節點索引: 27 為 left_ankle, 28 為 right_ankle
                        const leftAnkle = keypoints[27];
                        const rightAnkle = keypoints[28];
                        const feet = [leftAnkle, rightAnkle];

                        feet.forEach(foot => {
                            // 只有當 AI 對該部位的信心度高於 0.65 時才採信，防止雜訊干擾
                            if (foot && foot.score > 0.65) {
                                const fx = foot.x;
                                const fy = foot.y;

                                // 進行碰撞箱檢測 (Bounding Box Collision)
                                if (fy >= zoneY && fy <= canvas.height) {
                                    const zoneIndex = Math.floor(fx / zoneWidth);
                                    if (zoneIndex >= 0 && zoneIndex <= 2) {
                                        activeZonesThisFrame[zoneIndex] = true;
                                    }
                                }

                                // 在使用者的腳踝處繪製高對比度藍色科技光圈
                                ctx.beginPath();
                                ctx.arc(fx, fy, 16, 0, 2 * Math.PI);
                                ctx.strokeStyle = '#00f0ff';
                                ctx.lineWidth = 4;
                                ctx.shadowBlur = 15;
                                ctx.shadowColor = '#00f0ff';
                                ctx.stroke();
                                
                                // 內圈實心白色核心
                                ctx.beginPath();
                                ctx.arc(fx, fy, 6, 0, 2 * Math.PI);
                                ctx.fillStyle = '#ffffff';
                                ctx.fill();
                                
                                // 重設陰影防干擾後續繪製
                                ctx.shadowBlur = 0;
                            }
                        });
                    }
                } catch (e) {
                    console.error("AI 偵測影格出錯:", e);
                }
            }

            // 3. 繪製底部三個霓虹鋼琴地毯方格與狀態更新
            for (let i = 0; i < 3; i++) {
                const zoneX = i * zoneWidth;

                if (activeZonesThisFrame[i]) {
                    // 被踩中狀態：亮高對比黃色，並有發光特效
                    ctx.fillStyle = 'rgba(255, 234, 0, 0.65)';
                    ctx.fillRect(zoneX, zoneY, zoneWidth, zoneHeight);
                    
                    ctx.strokeStyle = '#ffff00';
                    ctx.lineWidth = 6;
                    ctx.strokeRect(zoneX, zoneY, zoneWidth, zoneHeight);

                    // 邊緣觸發機制 (Edge Trigger)：由「沒踩」變「踩中」的瞬間播放音效
                    if (!zoneStates[i]) {
                        playSound(frequencies[i]);
                        zoneStates[i] = true;
                    }
                } else {
                    // 常態未踩中：半透明科技霓虹藍
                    ctx.fillStyle = 'rgba(0, 240, 255, 0.08)';
                    ctx.fillRect(zoneX, zoneY, zoneWidth, zoneHeight);
                    
                    ctx.strokeStyle = 'rgba(0, 240, 255, 0.6)';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(zoneX, zoneY, zoneWidth, zoneHeight);
                    
                    zoneStates[i] = false;
                }

                // 4. 繪製按鈕文字 (考慮到 Canvas 被 CSS 鏡像反轉，文字需作二次反轉使其正常顯示)
                ctx.save();
                ctx.translate(zoneX + zoneWidth / 2, zoneY + zoneHeight / 2);
                ctx.scale(-1, 1); // 將文字水平翻轉回來
                
                ctx.fillStyle = activeZonesThisFrame[i] ? '#000000' : '#ffffff';
                ctx.font = 'bold 22px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const noteNames = ["音符 Do", "音符 Re", "音符 Mi"];
                ctx.fillText(noteNames[i], 0, 0);
                ctx.restore();
            }

            // 繼續下一影格
            requestAnimationFrame(renderLoop);
        }
    </script>
</body>
</html>
