<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巨型 AR 地毯踏踏樂 - 專業復康優化版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.2.0/dist/tf-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.2.0/dist/tf-converter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.2.0/dist/tf-backend-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            margin: 0; padding: 0; background: #08090f; color: #fff;
            font-family: system-ui, -apple-system, sans-serif; overflow: hidden;
            height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center;
        }

        /* 歡迎與授權 */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #151828 0%, #08090f 100%);
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .start-btn {
            background: linear-gradient(135deg, #00f0ff 0%, #7900ff 100%);
            color: white; border: none; padding: 18px 50px; font-size: 1.3rem; font-weight: bold;
            border-radius: 50px; cursor: pointer; box-shadow: 0 0 30px rgba(0, 240, 255, 0.3); transition: all 0.3s ease;
        }
        .start-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(0, 240, 255, 0.6); }

        /* 遊戲核心版面 */
        #game-container { position: relative; width: 100%; height: 100%; display: none; }
        #canvas-wrapper { position: relative; width: 100%; height: 100%; background: #000; }
        video { display: none; }
        canvas { height: 100%; width: 100%; object-fit: contain; transform: scaleX(-1); }

        /* 大字體、高對比 HUD 抬頭顯示 */
        #hud-top {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(8, 9, 15, 0.9); border-radius: 20px; padding: 15px 40px;
            border: 3px solid #00f0ff; text-align: center; z-index: 10; min-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        #task-instruction { font-size: 1.8rem; font-weight: 900; color: #ffff00; margin: 0; letter-spacing: 1px; }
        #score-text { font-size: 1.1rem; color: #a0a5c0; margin: 5px 0 0 0; }

        /* 校正指引遮罩 */
        #calibration-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #guide-msg {
            background: rgba(255, 0, 127, 0.85); padding: 12px 30px; border-radius: 30px;
            font-size: 1.3rem; font-weight: bold; color: white; margin-bottom: 20px;
            transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .guide-box {
            width: 55%; height: 75%; border: 4px dashed rgba(255, 0, 127, 0.6);
            border-radius: 24px; transition: all 0.3s ease;
        }
        /* 校正成功時的樣式變換 */
        .ready .guide-box { border-color: #00ff66; background: rgba(0, 255, 102, 0.03); }
        .ready #guide-msg { background: rgba(0, 200, 80, 0.9); }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="font-size: 2.5rem; color: #00f0ff; margin-bottom: 5px;">🎹 巨型 AR 地毯踏踏樂 (專業優化版)</h1>
        <p style="color: #a0a5c0; font-size: 1.1rem; max-width: 500px; text-align: center; line-height: 1.6; margin-bottom: 30px;">
            本版本優化了<b>「防長者雙腳連續誤觸機制」</b>，並新增了<b>「大腦認知任務模式」</b>與遠距離自動偵測校正框。
        </p>
        <button id="btn-start" class="start-btn">開始復康訓練</button>
        <div id="status-text" style="margin-top: 15px; font-size: 0.9rem; color: #ff007f;">系統就緒。</div>
    </div>

    <div id="game-container">
        <div id="hud-top">
            <p id="task-instruction">🔍 正在偵測您的雙腳...</p>
            <p id="score-text">成功踩踏得分: <span id="score-val" style="color:#00f0ff; font-weight:bold;">0</span></p>
        </div>
        
        <div id="calibration-overlay">
            <div id="guide-msg">⚠️ 請向後退，讓全身入鏡</div>
            <div class="guide-box"></div>
        </div>

        <div id="canvas-wrapper">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="output-canvas"></canvas>
        </div>
    </div>

    <script>
        const btnStart = document.getElementById('btn-start');
        const welcomeScreen = document.getElementById('welcome-screen');
        const gameContainer = document.getElementById('game-container');
        const statusText = document.getElementById('status-text');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        
        // UI 元件
        const calibrationOverlay = document.getElementById('calibration-overlay');
        const guideMsg = document.getElementById('guide-msg');
        const taskInstruction = document.getElementById('task-instruction');
        const scoreVal = document.getElementById('score-val');

        let detector;
        let audioCtx;
        let isRunning = false;
        let isCalibrated = false;

        // 認知遊戲邏輯變數
        let currentTargetZone = -1; // 當前提示要踩的目標區域 (0, 1, 2)
        let score = 0;

        // 【專業防誤觸核心】鎖定機制
        // 只有當區域從 false 變 true 的那一瞬間（Edge Trigger）才算得分並響音樂
        let zoneStates = [false, false, false]; 
        const frequencies = [261.63, 293.66, 329.63]; // Do, Re, Mi

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // 播放溫和的高品質復康回饋音效
        function playTone(freq, type = 'triangle', duration = 0.4) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // 隨機更換下一個認知踩踏目標
        function nextChallenge() {
            const lastTarget = currentTargetZone;
            // 確保連續兩次目標不重複
            while (currentTargetZone === lastTarget) {
                currentTargetZone = Math.floor(Math.random() * 3);
            }
            const zoneNames = ["左邊【 1 號地毯 】", "中間【 2 號地毯 】", "右邊【 3 號地毯 】"];
            taskInstruction.innerText = `🎯 請用腳踩：${zoneNames[currentTargetZone]}`;
            taskInstruction.style.color = "#ffff00";
        }

        btnStart.addEventListener('click', async () => {
            btnStart.disabled = true;
            statusText.innerText = '⚡ 正在調配相機並喚醒 AI 骨骼追蹤引擎...';
            
            try {
                initAudio();
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;
                await new Promise((resolve) => { video.onloadedmetadata = () => resolve(video); });
                video.play();

                statusText.innerText = '⚙️ 正在建立樂齡防跌視覺辨識模組...';
                detector = await poseDetection.createDetector(
                    poseDetection.SupportedModels.BlazePose, 
                    { runtime: 'tfjs', enableSmoothing: true, modelType: 'full' }
                );

                welcomeScreen.style.display = 'none';
                gameContainer.style.display = 'block';
                isRunning = true;
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                requestAnimationFrame(renderLoop);
            } catch (err) {
                console.error(err);
                btnStart.disabled = false;
                statusText.innerText = '❌ 開啟失敗：請確認鏡頭權限已開啟，或嘗試更換瀏覽器。';
            }
        });

        async function renderLoop() {
            if (!isRunning) return;

            // 1. 繪製相機原生影格
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const zoneWidth = canvas.width / 3;
            const zoneHeight = canvas.height * 0.25;
            const zoneY = canvas.height - zoneHeight;
            
            let activeZonesThisFrame = [false, false, false];
            let feetDetectedThisFrame = 0;

            // 2. AI 人體姿態識別與防跌結點抓取
            if (detector) {
                try {
                    const poses = await detector.estimatePoses(video, { flipHorizontal: false, maxPoses: 1 });

                    if (poses && poses.length > 0) {
                        const keypoints = poses[0].keypoints;
                        const leftAnkle = keypoints[27];
                        const rightAnkle = keypoints[28];
                        const feet = [leftAnkle, rightAnkle];

                        feet.forEach(foot => {
                            // 調高信心度閾值至 0.7，排除長者長褲、裙襬或地板雜物陰影造成的抖動誤判
                            if (foot && foot.score > 0.7) {
                                feetDetectedThisFrame++;
                                const fx = foot.x;
                                const fy = foot.y;

                                // 踩踏碰撞檢測
                                if (fy >= zoneY && fy <= canvas.height) {
                                    const zoneIndex = Math.floor(fx / zoneWidth);
                                    if (zoneIndex >= 0 && zoneIndex <= 2) {
                                        activeZonesThisFrame[zoneIndex] = true;
                                    }
                                }

                                // 高對比樂齡友善視覺反饋：外圈加粗發光霓虹藍
                                ctx.beginPath();
                                ctx.arc(fx, fy, 20, 0, 2 * Math.PI);
                                ctx.strokeStyle = '#00f0ff';
                                ctx.lineWidth = 5;
                                ctx.stroke();
                                
                                // 內圈高亮實心核心
                                ctx.beginPath();
                                ctx.arc(fx, fy, 8, 0, 2 * Math.PI);
                                ctx.fillStyle = '#ffffff';
                                ctx.fill();
                            }
                        });
                    }
                } catch (e) { console.error(e); }
            }

            // 3. 自動智能校正引導機制
            // 必須同時清晰偵測到雙腳 (2隻腳)，才視為成功入鏡
            if (feetDetectedThisFrame >= 2) {
                if (!isCalibrated) {
                    isCalibrated = true;
                    calibrationOverlay.classList.add('ready');
                    guideMsg.innerText = '✅ 校正成功！準備開始';
                    // 延時 1.5 秒後隱藏校正框，讓畫面乾淨
                    setTimeout(() => {
                        calibrationOverlay.style.display = 'none';
                        nextChallenge(); // 啟動第一個遊戲任務
                    }, 1500);
                }
            } else {
                // 如果長者中途走開或走太近導致腳出鏡，重新顯示引導
                if (isCalibrated && calibrationOverlay.style.display === 'none') {
                    isCalibrated = false;
                    calibrationOverlay.style.display = 'flex';
                    calibrationOverlay.classList.remove('ready');
                    guideMsg.innerText = '⚠️ 請向後退，讓全身上下入鏡';
                    taskInstruction.innerText = `🔍 正在等待長者就位...`;
                    taskInstruction.style.color = "#ff007f";
                }
            }

            // 4. 繪製高對比霓虹大方格與防誤觸音效邏輯
            for (let i = 0; i < 3; i++) {
                const zoneX = i * zoneWidth;

                if (isCalibrated && activeZonesThisFrame[i]) {
                    // 踩中狀態：極高對比亮黃色 (符合弱視/白內障長者視覺優化)
                    ctx.fillStyle = 'rgba(255, 234, 0, 0.75)';
                    ctx.fillRect(zoneX, zoneY, zoneWidth, zoneHeight);
                    ctx.strokeStyle = '#ffff00';
                    ctx.lineWidth = 8;
                    ctx.strokeRect(zoneX, zoneY, zoneWidth, zoneHeight);

                    // 【核心優化：邊緣觸發與防重複誤觸演算法】
                    if (!zoneStates[i]) {
                        zoneStates[i] = true; // 鎖定狀態

                        // 判斷是否踩中認知指定的正確任務方格
                        if (i === currentTargetZone) {
                            score += 10;
                            scoreVal.innerText = score;
                            // 答對給予清脆的成功音效
                            playTone(523.25, 'sine', 0.2); // 高音 Do
                            setTimeout(() => playTone(659.25, 'sine', 0.3), 100); // 高音 Mi
                            
                            taskInstruction.innerText = "🌟 太棒了！答對了！";
                            taskInstruction.style.color = "#00ff66";
                            
                            // 1.2 秒後切換下一個隨機任務，給長者足夠的反應與收腳時間
                            setTimeout(nextChallenge, 1200);
                        } else {
                            // 踩錯或者單純踩普通鍵：播放常規地毯音
                            playTone(frequencies[i], 'triangle', 0.4);
                        }
                    }
                } else {
                    // 常態未踩中：高飽和度霓虹藍粗邊框，內部極低透明度，防背景反光干擾
                    ctx.fillStyle = 'rgba(0, 240, 255, 0.04)';
                    ctx.fillRect(zoneX, zoneY, zoneWidth, zoneHeight);
                    ctx.strokeStyle = 'rgba(0, 240, 255, 0.8)';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(zoneX, zoneY, zoneWidth, zoneHeight);
                    
                    // 當腳完全離開該格，解開鎖定，允許下一次踩踏
                    zoneStates[i] = false;
                }

                // 5. 繪製清晰巨大的編號文字（作二次水平反轉防鏡像顛倒）
                ctx.save();
                ctx.translate(zoneX + zoneWidth / 2, zoneY + zoneHeight / 2);
                ctx.scale(-1, 1);
                ctx.fillStyle = (isCalibrated && activeZonesThisFrame[i]) ? '#000000' : '#ffffff';
                ctx.font = 'bold 32px system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${i + 1} 號`, 0, 0);
                ctx.restore();
            }

            requestAnimationFrame(renderLoop);
        }
    </script>
</body>
</html>
