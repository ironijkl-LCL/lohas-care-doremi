<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巨型 AR 8圓體感牆 - 2秒黃金安全瘋狂版</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.2.0/dist/tf-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.2.0/dist/tf-converter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.2.0/dist/tf-backend-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

    <style>
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body {
            background: #000; color: #fff;
            font-family: 'Arial Black', system-ui, -apple-system, sans-serif; overflow: hidden;
            height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center;
        }

        /* 未啟動遊戲：歡迎畫面 */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2b001a 0%, #000000 100%);
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .start-btn {
            background: linear-gradient(135deg, #00f0ff 0%, #ff007f 100%);
            color: white; border: none; padding: 20px 60px; font-size: 1.6rem; font-weight: 900;
            border-radius: 50px; cursor: pointer; box-shadow: 0 0 35px rgba(255, 0, 127, 0.6); transition: all 0.3s ease;
            letter-spacing: 2px;
        }
        .start-btn:hover { transform: scale(1.08); box-shadow: 0 0 50px rgba(0, 240, 255, 0.9); }

        /* 遊戲核心版面 */
        #game-container { position: relative; width: 100%; height: 100%; display: none; }
        #canvas-wrapper { position: relative; width: 100%; height: 100%; background: #000; }
        video { display: none; }
        canvas { height: 100%; width: 100%; object-fit: contain; transform: scaleX(-1); }

        /* 頂部極簡計分板 */
        #hud-top {
            position: absolute; top: 25px; right: 25px; z-index: 10; pointer-events: none;
        }
        #score-text { 
            font-size: 1.8rem; color: #00f0ff; font-weight: 900;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 2px 2px #000; 
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="font-size: 3.2rem; color: #00f0ff; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,240,255,0.7); letter-spacing: 3px;">🔥 8 圓無限地獄狂歡 🔥</h1>
        <p style="color: #ff007f; font-size: 1.4rem; font-weight: bold; margin-bottom: 35px; letter-spacing: 1px;">—— 2秒黃金安全線 • 多目標街機復康版 ——</p>
        
        <div style="background: rgba(255,255,255,0.02); border: 2px solid rgba(0, 240, 255, 0.4); border-radius: 20px; padding: 25px; max-width: 620px; margin-bottom: 40px; text-align: left; line-height: 1.7; backdrop-filter: blur(10px);">
            <p style="color: #ffff00; font-weight: 900; font-size: 1.2rem; margin-bottom: 10px;">⚡ 2秒逼迫催促機制：</p>
            <p style="color: #e2e4ed;">1. <b>速度向 2 秒對齊</b>：圓圈停留在畫面上的存活時間隨分數從 3.5 秒<b>幾何式縮短到極限 2 秒</b>。在兩秒內沒有出擊，圓圈會直接快閃消失並重置！</p>
            <p style="color: #e2e4ed;">2. <b>目標數量越來越多</b>：分數突破 50分 變 2 個圓圈同時亮，突破 110分 變 3 個圓圈同時爆裂，強迫全身手舞足蹈！</p>
            <p style="color: #e2e4ed;">3. <b>強烈去底色透視文字</b>：答對瞬間字體<b>激增 1.5 倍發光變綠</b>，跳出 🌟 完美擊中！</p>
        </div>

        <button id="btn-start" class="start-btn">接受催促挑戰</button>
        <div id="status-text" style="margin-top: 20px; font-size: 1rem; color: #a0a5c0;">強烈 Techno 快板節奏準備就緒！</div>
    </div>

    <div id="game-container">
        <div id="hud-top">
            <p id="score-text">SCORE: <span id="score-val" style="color:#00ff66;">0</span></p>
        </div>
        <div id="canvas-wrapper">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="output-canvas"></canvas>
        </div>
    </div>

    <script>
        const btnStart = document.getElementById('btn-start');
        const welcomeScreen = document.getElementById('welcome-screen');
        const gameContainer = document.getElementById('game-container');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('score-val');

        let detector;
        let audioCtx;
        let isRunning = false;
        let score = 0;
        let latestPoses = []; 

        // 瘋狂多目標控制
        let currentTargetZones = []; 
        let targetCount = 1;      
        let targetLifeTime = 3500; // 初始存活時間 3.5 秒
        let nextTaskTimestamp = 0; 

        // 中央大字控制
        let centerTaskText = "預備！雙手雙腳就位";
        let centerTextColor = "#ffff00";
        let centerTextScale = 1.0; 

        // 像素動態對比
        let lastFrameData = null;
        
        // 防閃爍維持時間
        let zoneStates = new Array(8).fill(false); 
        let activeTimers = new Array(8).fill(0); 
        const HOLD_DURATION = 350; 

        const baseFrequencies = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
        let circlesConfig = [];

        // --- 🎵 雙軌重低音極速電音引擎 ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startExtremeTechnoBGM(); 
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function startExtremeTechnoBGM() {
            let beatCount = 0;
            function playNextBeat() {
                if (!isRunning) return;
                const time = audioCtx.currentTime;
                
                // Techno 快板背景音樂速度隨分數變快
                const tempoSpeed = Math.max(120, 230 - ((score / 10) * 4.0)); 

                // 低音炮 (Kick)
                if (beatCount % 2 === 0) {
                    const kickOsc = audioCtx.createOscillator();
                    const kickGain = audioCtx.createGain();
                    kickOsc.type = 'sine';
                    kickOsc.frequency.setValueAtTime(95, time);
                    kickOsc.frequency.exponentialRampToValueAtTime(33, time + 0.09);
                    kickGain.gain.setValueAtTime(0.28, time); 
                    kickGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
                    kickOsc.connect(kickGain);
                    kickGain.connect(audioCtx.destination);
                    kickOsc.start(time);
                    kickOsc.stop(time + 0.1);
                }

                // 高頻金屬擦片 (Hi-Hat Clicker)
                const hatOsc = audioCtx.createOscillator();
                const hatGain = audioCtx.createGain();
                hatOsc.type = 'triangle';
                hatOsc.frequency.setValueAtTime(7000 + (beatCount % 4 * 400), time);
                hatGain.gain.setValueAtTime(0.05, time);
                hatGain.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
                hatOsc.connect(hatGain);
                hatGain.connect(audioCtx.destination);
                hatOsc.start(time);
                hatOsc.stop(time + 0.03);

                beatCount++;
                setTimeout(playNextBeat, tempoSpeed); 
            }
            playNextBeat();
        }

        function playArcadeLaser(freq, isCorrect = false) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            if (isCorrect) {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 2.8, now + 0.2);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            } else {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, now);
                gain.gain.setValueAtTime(0.18, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
            }
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + (isCorrect ? 0.2 : 0.12));
        }

        // 1:1 照鏡子映射
        function updateCirclesLayout() {
            const w = canvas.width;
            const h = canvas.height;
            const r = Math.min(w, h) * 0.076; // 縮小 35% 的精準按鈕半徑
            
            const cx = [w * 0.85, w * 0.5, w * 0.15]; 
            const cy = [h * 0.20, h * 0.5, h * 0.80]; 

            circlesConfig = [
                { id: 0, name: "左上方 🔴", x: cx[0], y: cy[0], radius: r, type: 'hand' },
                { id: 1, name: "正上方 🔴", x: cx[1], y: cy[0], radius: r, type: 'hand' },
                { id: 2, name: "右上方 🔴", x: cx[2], y: cy[0], radius: r, type: 'hand' },
                { id: 3, name: "左邊 🟢",   x: cx[0], y: cy[1], radius: r, type: 'side' },
                { id: 4, name: "右邊 🟢",   x: cx[2], y: cy[1], radius: r, type: 'side' },
                { id: 5, name: "左下方 🔵", x: cx[0], y: cy[2], radius: r, type: 'foot' },
                { id: 6, name: "正下方 🔵", x: cx[1], y: cy[2], radius: r, type: 'foot' },
                { id: 7, name: "右下方 🔵", x: cx[2], y: cy[2], radius: r, type: 'foot' }
            ];
        }

        // 【修改點：動態難度幾何式縮短至極限 2 秒演算法】
        function generateNewChallenge() {
            const now = Date.now();
            currentTargetZones = [];

            // 1. 分數越高，同時亮燈數量越多
            if (score <= 50) {
                targetCount = 1;
            } else if (score <= 110) {
                targetCount = 2; 
            } else {
                targetCount = 3; 
            }

            // 2. 幾何式向 2.0 秒（2000ms）逼近對齊
            // 初始 3500ms，每得 10 分縮短 150ms，當得分高於 100 分時，強制精準鎖定在安全黃金極限 2000ms！
            targetLifeTime = Math.max(2000, 3500 - ((score / 10) * 150));

            while (currentTargetZones.length < targetCount) {
                const randIndex = Math.floor(Math.random() * 8);
                if (!currentTargetZones.includes(randIndex)) {
                    currentTargetZones.push(randIndex);
                }
            }

            // 3. 更新中央字體題目
            if (targetCount === 1) {
                const labels = ["左上方 🔴", "正上方 🔴", "右上方 🔴", "左邊 🟢", "右邊 🟢", "左下方 🔵", "正下方 🔵", "右下方 🔵"];
                centerTaskText = `🎯 擊中：${labels[currentTargetZones[0]]}`;
            } else if (targetCount === 2) {
                centerTaskText = "⚡ 雙重目標炸裂！快擊中！ ⚡";
            } else {
                centerTaskText = "🔥 地獄狂歡！全肢體出擊！ 🔥";
            }

            centerTextColor = "#ffff00"; 
            centerTextScale = 1.0; 
            
            // 計算此題強制快閃消失的時間戳
            nextTaskTimestamp = now + targetLifeTime;
        }

        btnStart.addEventListener('click', async () => {
            try {
                initAudio();
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;
                await new Promise((resolve) => { video.onloadedmetadata = () => resolve(video); });
                video.play();

                welcomeScreen.style.display = 'none';
                gameContainer.style.display = 'block';
                isRunning = true;
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                updateCirclesLayout();
                
                poseDetection.createDetector(
                    poseDetection.SupportedModels.BlazePose, { runtime: 'tfjs', enableSmoothing: true, modelType: 'full' }
                ).then(d => { detector = d; }).catch(e => console.log("本地像素動態感應中"));

                requestAnimationFrame(renderLoop);
                setInterval(runAIInBackground, 100); 
                generateNewChallenge();

            } catch (err) { alert('鏡頭權限受限。'); }
        });

        async function runAIInBackground() {
            if (!isRunning || !detector) return;
            try {
                const poses = await detector.estimatePoses(video, { flipHorizontal: false, maxPoses: 1 });
                if (poses && poses.length > 0) latestPoses = poses[0].keypoints;
            } catch (e) {}
        }

        function renderLoop() {
            if (!isRunning) return;

            const now = Date.now();

            // 【時間到期快閃重置】：2秒（或倒數到期）未擊中，直接換題！
            if (now > nextTaskTimestamp) {
                generateNewChallenge();
            }

            // 1. 畫出原始影格
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 2. 圓形動態像素感應（僅感應目前題目陣列中的圓圈）
            const currentFrameData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let motionCounter = new Array(8).fill(0);

            if (lastFrameData) {
                for (let y = 0; y < canvas.height; y += 4) {
                    for (let x = 0; x < canvas.width; x += 4) {
                        circlesConfig.forEach((circle, idx) => {
                            if (currentTargetZones.includes(idx)) {
                                const dx = x - circle.x;
                                const dy = y - circle.y;
                                if (dx * dx + dy * dy < circle.radius * circle.radius) {
                                    const i = (y * canvas.width + x) * 4;
                                    const diffR = Math.abs(currentFrameData.data[i] - lastFrameData.data[i]);
                                    const diffG = Math.abs(currentFrameData.data[i+1] - lastFrameData.data[i+1]);
                                    const diffB = Math.abs(currentFrameData.data[i+2] - lastFrameData.data[i+2]);
                                    if (diffR + diffG + diffB > 75) motionCounter[idx]++;
                                }
                            }
                        });
                    }
                }
            }
            lastFrameData = currentFrameData;

            // 檢查擊中
            for (let i = 0; i < 8; i++) {
                if (currentTargetZones.includes(i) && motionCounter[i] > 10) {
                    activeTimers[i] = now + HOLD_DURATION; 
                }
            }

            // 3. 畫出人類手腳 AI 霓虹圈
            if (latestPoses && latestPoses.length > 0) {
                const pointsToDraw = [11, 12, 15, 16, 23, 24, 27, 28];
                pointsToDraw.forEach(index => {
                    const kp = latestPoses[index];
                    if (kp && kp.score > 0.4) {
                        ctx.beginPath();
                        ctx.arc(kp.x, kp.y, 13, 0, 2 * Math.PI);
                        ctx.strokeStyle = (index === 15 || index === 16) ? '#ff007f' : '#00f0ff'; 
                        ctx.lineWidth = 4;
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(kp.x, kp.y, 4, 0, 2 * Math.PI);
                        ctx.fillStyle = '#ffffff';
                        ctx.fill();
                    }
                });
            }

            // 4. 【多目標減法渲染】：只有在題目中的圓圈才進行著燈繪製
            circlesConfig.forEach((circle, i) => {
                if (currentTargetZones.includes(circle.id)) {
                    const isVisuallyActive = now < activeTimers[circle.id];
                    ctx.save();
                    
                    if (isVisuallyActive) {
                        // 擊中：黃金爆炸亮燈
                        ctx.beginPath();
                        ctx.arc(circle.x, circle.y, circle.radius * 1.08, 0, 2 * Math.PI);
                        ctx.fillStyle = 'rgba(255, 221, 0, 0.85)';
                        ctx.fill();
                        ctx.strokeStyle = '#ffff00';
                        ctx.lineWidth = 8;
                        ctx.stroke();

                        if (!zoneStates[circle.id]) {
                            zoneStates[circle.id] = true;
                            
                            score += 10;
                            scoreVal.innerText = score;
                            playArcadeLaser(baseFrequencies[circle.id], true);

                            // 【答對震撼視覺反饋】：字體發光、變螢光綠、體積膨脹 1.5 倍
                            centerTaskText = "🌟 完美擊中！";
                            centerTextColor = "#00ff66"; 
                            centerTextScale = 1.5; 
                            
                            // 移除被擊中的圓圈
                            currentTargetZones = currentTargetZones.filter(id => id !== circle.id);
                            
                            // 該輪題目全部被接住清空時，立刻生成新題目
                            if (currentTargetZones.length === 0) {
                                setTimeout(generateNewChallenge, 400); 
                            }
                        }
                    } else {
                        // 未擊中：題目要求的精準霓虹亮圈
                        ctx.beginPath();
                        ctx.arc(circle.x, circle.y, circle.radius, 0, 2 * Math.PI);
                        if (circle.type === 'hand') {
                            ctx.fillStyle = 'rgba(255, 0, 127, 0.22)';
                            ctx.strokeStyle = '#ff007f';
                        } else if (circle.type === 'side') {
                            ctx.fillStyle = 'rgba(0, 255, 102, 0.22)';
                            ctx.strokeStyle = '#00ff66';
                        } else {
                            ctx.fillStyle = 'rgba(0, 240, 255, 0.22)';
                            ctx.strokeStyle = '#00f0ff';
                        }
                        ctx.fill();
                        ctx.lineWidth = 5;
                        ctx.stroke();
                        
                        zoneStates[circle.id] = false;
                    }

                    // 繪製圓圈內文字
                    ctx.translate(circle.x, circle.y);
                    ctx.scale(-1, 1);
                    ctx.fillStyle = isVisuallyActive ? '#000000' : '#ffffff';
                    ctx.font = 'bold 18px system-ui';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const labels = ["左上方", "正上方", "右上方", "左 邊", "右 邊", "左下方", "正下方", "右下方"];
                    ctx.fillText(labels[circle.id], 0, 0);
                    ctx.restore();
                } else {
                    zoneStates[circle.id] = false;
                }
            });

            // 5. 【去底色純透視】中央動態巨大字體
            ctx.save();
            ctx.translate(canvas.width * 0.5, canvas.height * 0.5);
            ctx.scale(-1 * centerTextScale, 1 * centerTextScale); // 實時答對膨脹

            ctx.fillStyle = centerTextColor;
            ctx.font = 'bold 36px Arial Black, system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 黑色高階描邊，確保全場最高清晰度
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.9)';
            ctx.lineWidth = 8;
            ctx.strokeText(centerTaskText, 0, 0);
            ctx.fillText(centerTaskText, 0, 0);
            
            ctx.restore();

            requestAnimationFrame(renderLoop);
        }

        window.addEventListener('resize', () => {
            if(canvas.width > 0) updateCirclesLayout();
        });
    </script>
</body>
</html>
