<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巨型AR體感復康牆</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.2.0/dist/tf-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.2.0/dist/tf-converter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.2.0/dist/tf-backend-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

    <style>
        * { box-sizing: border-box;
            user-select: none; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Arial Black', system-ui, -apple-system, sans-serif; overflow: hidden;
            height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center;
        }

        /* --- 歡迎與 Level 選擇畫面 --- */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111422 0%, #000000 100%);
            z-index: 100; display: flex;
            flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }
        .btn-container {
            display: flex;
            gap: 30px; margin-top: 20px;
        }
        .start-btn {
            color: white;
            border: none; padding: 22px 45px; font-size: 1.4rem; font-weight: 900;
            border-radius: 50px; cursor: pointer; transition: all 0.3s ease; letter-spacing: 1px;
        }
        .btn-lvl1 {
            background: linear-gradient(135deg, #00f0ff 0%, #00ff66 100%);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
        }
        .btn-lvl1:hover { transform: scale(1.06);
            box-shadow: 0 0 40px rgba(0, 255, 102, 0.7); }
        
        .btn-lvl2 {
            background: linear-gradient(135deg, #ff007f 0%, #7900ff 100%);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.4);
        }
        .btn-lvl2:hover { transform: scale(1.06);
            box-shadow: 0 0 40px rgba(255, 0, 127, 0.7); }

        /* 遊戲核心版面 */
        #game-container { position: relative;
            width: 100%; height: 100%; display: none; }
        #canvas-wrapper { position: relative; width: 100%;
            height: 100%; background: #000; }
        video { display: none; }
        canvas { height: 100%; width: 100%; object-fit: contain; transform: scaleX(-1); }

        /* 頂部極簡計分板 */
        #hud-top {
            position: absolute;
            top: 25px; right: 25px; z-index: 10; pointer-events: none;
        }
        #score-text { 
            font-size: 1.8rem;
            color: #00f0ff; font-weight: 900;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.8), 2px 2px #000;
        }

        /* 📺 電視投影專用：右下角畫面縮放控制面板 */
        #zoom-controls {
            position: absolute;
            bottom: 25px; right: 25px; z-index: 20;
            display: flex; gap: 12px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .zoom-btn {
            background: #222; color: #fff; border: 1px solid #444;
            padding: 10px 18px; font-size: 1rem; font-weight: bold;
            border-radius: 8px; cursor: pointer; transition: all 0.2s ease;
        }
        .zoom-btn:hover { background: #00f0ff; color: #000; border-color: #00f0ff; }
        .zoom-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="font-size: 3rem; color: #00f0ff; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,240,255,0.6); letter-spacing: 2px;">🔮 AR 全方位肢體體感牆 🔮</h1>
        <p style="color: #a0a5c0; font-size: 1.2rem; font-weight: bold; margin-bottom: 40px;">—— 跨世代免手持 1:1 鏡反射復康系統 ——</p>
        
        <div class="btn-container">
            <button id="btn-level-1" class="start-btn btn-lvl1">Level 1: 輕鬆普通版<br><span style="font-size:0.9rem; font-weight:normal; color:#fff;">(單個大圓圈・無數字・適合入門)</span></button>
            <button id="btn-level-2" class="start-btn btn-lvl2">Level 2: 終極順序流<br><span style="font-size:0.9rem; font-weight:normal; color:#fff;">(8圓炸裂・數字1-8隨機洗牌連擊)</span></button>
        </div>
        
        <div id="status-text" style="margin-top: 40px; font-size: 1rem; color: #ff007f; font-weight:bold;">請選擇關卡開始訓練（點擊將自動開啟鏡頭與音樂合成器）</div>
    </div>

    <div id="game-container">
        <div id="hud-top">
            <p id="score-text">SCORE: <span id="score-val" style="color:#00ff66;">0</span></p>
        </div>

        <div id="zoom-controls">
            <button id="btn-zoom-in" class="zoom-btn">＋ 放大</button>
            <button id="btn-zoom-out" class="zoom-btn">－ 縮小</button>
            <button id="btn-zoom-reset" class="zoom-btn">🔄 預設</button>
        </div>

        <div id="canvas-wrapper">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="output-canvas"></canvas>
        </div>
    </div>

    <script>
        const welcomeScreen = document.getElementById('welcome-screen');
        const gameContainer = document.getElementById('game-container');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('score-val');
        const statusText = document.getElementById('status-text');

        let detector;
        let audioCtx;
        let isRunning = false;
        let score = 0;
        let latestPoses = [];
        // --- 關卡核心控制變數 ---
        let gameLevel = 1;
        let nextExpectedNumber = 1;
        let targetLifeTime = 2000;
        let nextTaskTimestamp = 0;
        let currentTargetZoneLvl1 = -1;

        // --- 📺 放大鏡控制倍率變數 ---
        let globalZoomScale = 1.0; 

        // 中央去底色大字
        let centerTaskText = "預備！雙手雙腳就位";
        let centerTextColor = "#ffff00";
        let centerTextScale = 1.0; 

        // 像素動態對比
        let lastFrameData = null;
        let zoneStates = new Array(8).fill(false); 
        let activeTimers = new Array(8).fill(0);
        const HOLD_DURATION = 350; 

        const baseFrequencies = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
        let circlesConfig = [];

        // --- 🎵 雙軌重低音快板電音引擎 ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startTechnoBGM(); 
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function startTechnoBGM() {
            let beatCount = 0;
            function playNextBeat() {
                if (!isRunning) return;
                const time = audioCtx.currentTime;
                const baseTempo = (gameLevel === 2) ? 220 : 300;
                const tempoSpeed = Math.max(110, baseTempo - ((score / 10) * 3.5));
                if (beatCount % 2 === 0) {
                    const kickOsc = audioCtx.createOscillator();
                    const kickGain = audioCtx.createGain();
                    kickOsc.type = 'sine';
                    kickOsc.frequency.setValueAtTime(gameLevel === 2 ? 95 : 85, time);
                    kickOsc.frequency.exponentialRampToValueAtTime(33, time + 0.1);
                    kickGain.gain.setValueAtTime(0.25, time); 
                    kickGain.gain.exponentialRampToValueAtTime(0.001, time + 0.11);
                    kickOsc.connect(kickGain);
                    kickGain.connect(audioCtx.destination);
                    kickOsc.start(time);
                    kickOsc.stop(time + 0.11);
                }

                const hatOsc = audioCtx.createOscillator();
                const hatGain = audioCtx.createGain();
                hatOsc.type = 'triangle';
                hatOsc.frequency.setValueAtTime(6500 + (beatCount % 4 * 400), time);
                hatGain.gain.setValueAtTime(0.04, time);
                hatGain.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
                hatOsc.connect(hatGain);
                hatGain.connect(audioCtx.destination);
                hatOsc.start(time);
                hatOsc.stop(time + 0.03);

                beatCount++;
                setTimeout(playNextBeat, tempoSpeed);
            }
            playNextBeat();
        }

        function playArcadeLaser(freq, isCorrect = false) {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            if (isCorrect) {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 3.0, now + 0.2);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            } else {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(140, now);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
            }
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + (isCorrect ? 0.2 : 0.12));
        }

        // 1:1 鏡像坐標映射（套用全球放大縮小率）
        function updateCirclesLayout() {
            const w = canvas.width;
            const h = canvas.height;
            
            // 基礎半徑乘上用戶調整的 globalZoomScale 放大率
            const baseRadiusMultiplier = (gameLevel === 2) ? 0.076 : 0.12;
            const r = Math.min(w, h) * baseRadiusMultiplier * globalZoomScale;
            
            const cx = [w * 0.85, w * 0.5, w * 0.15];
            const cy = [h * 0.20, h * 0.5, h * 0.80];
            circlesConfig = [
                { id: 0, labelName: "左上方", x: cx[0], y: cy[0], radius: r, type: 'hand', number: 0, isCleared: false },
                { id: 1, labelName: "正上方", x: cx[1], y: cy[0], radius: r, type: 'hand', number: 0, isCleared: false },
                { id: 2, labelName: "右上方", x: cx[2], y: cy[0], radius: r, type: 'hand', number: 0, isCleared: false },
                { id: 3, labelName: "左 邊",  x: cx[0], y: cy[1], radius: r, type: 'side', number: 0, isCleared: false },
                { id: 4, labelName: "右 邊",  x: cx[2], y: cy[1], radius: r, type: 'side', number: 0, isCleared: false },
                { id: 5, labelName: "左下方", x: cx[0], y: cy[2], radius: r, type: 'foot', number: 0, isCleared: false },
                { id: 6, labelName: "正下方", x: cx[1], y: cy[2], radius: r, type: 'foot', number: 0, isCleared: false },
                { id: 7, labelName: "右下方", x: cx[2], y: cy[2], radius: r, type: 'foot', number: 0, isCleared: false }
            ];
        }

        // --- 🧠 核心關卡任務調度器 ---
        function generateNewChallenge() {
            const now = Date.now();
            if (gameLevel === 1) {
                const lastZone = currentTargetZoneLvl1;
                while (currentTargetZoneLvl1 === lastZone) {
                    currentTargetZoneLvl1 = Math.floor(Math.random() * 8);
                }
                const directionLabels = ["🏀", "🏀", "🏀", "🏐", "🏐", "⚽", "⚽", "⚽"];
                centerTaskText = `🎯 擊中：${directionLabels[currentTargetZoneLvl1]}`;
                centerTextColor = "#ffff00";
                centerTextScale = 1.0;
                nextTaskTimestamp = now + 99999999;
            } else {
                const numbers = [1, 2, 3, 4, 5, 6, 7, 8];
                for (let i = numbers.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
                }
                circlesConfig.forEach((circle, idx) => {
                    circle.number = numbers[idx];
                    circle.isCleared = false;
                });
                centerTaskText = `🔍 請尋找數字：${nextExpectedNumber}`;
                centerTextColor = "#ffff00";
                centerTextScale = 1.0;
                nextTaskTimestamp = now + targetLifeTime;
            }
        }

        document.getElementById('btn-level-1').addEventListener('click', () => { idStartFlow(1); });
        document.getElementById('btn-level-2').addEventListener('click', () => { idStartFlow(2); });

        // 📺 綁定放大縮小按鈕事件
        document.getElementById('btn-zoom-in').addEventListener('click', () => {
            globalZoomScale = Math.min(2.0, globalZoomScale + 0.1); // 最高放大至 2 倍
            updateCirclesLayout();
        });
        document.getElementById('btn-zoom-out').addEventListener('click', () => {
            globalZoomScale = Math.max(0.5, globalZoomScale - 0.1); // 最低縮小至 0.5 倍
            updateCirclesLayout();
        });
        document.getElementById('btn-zoom-reset').addEventListener('click', () => {
            globalZoomScale = 1.0; // 恢復預設 1.0
            updateCirclesLayout();
        });

        async function idStartFlow(selectedLevel) {
            gameLevel = selectedLevel;
            document.getElementById('btn-level-1').disabled = true;
            document.getElementById('btn-level-2').disabled = true;
            statusText.innerText = `⚡ 正在啟動鏡頭與音樂合成器，切換至 Level ${gameLevel}...`;
            try {
                initAudio();
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" },
                    audio: false
                });
                video.srcObject = stream;
                await new Promise((resolve) => { video.onloadedmetadata = () => resolve(video); });
                video.play();

                welcomeScreen.style.display = 'none';
                gameContainer.style.display = 'block';
                isRunning = true;
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                updateCirclesLayout();
                generateNewChallenge();
                poseDetection.createDetector(
                    poseDetection.SupportedModels.BlazePose, { runtime: 'tfjs', enableSmoothing: true, modelType: 'full' }
                ).then(d => { detector = d; }).catch(e => console.log("像素感應引擎全速就緒"));
                requestAnimationFrame(renderLoop);
                setInterval(runAIInBackground, 100); 

            } catch (err) { alert('鏡頭權限錯誤。'); }
        }

        async function runAIInBackground() {
            if (!isRunning || !detector) return;
            try {
                const poses = await detector.estimatePoses(video, { flipHorizontal: false, maxPoses: 1 });
                if (poses && poses.length > 0) latestPoses = poses[0].keypoints;
            } catch (e) {}
        }

        function renderLoop() {
            if (!isRunning) return;
            const now = Date.now();

            if (gameLevel === 2 && now > nextTaskTimestamp) {
                playArcadeLaser(100, false);
                generateNewChallenge();
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const currentFrameData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let motionCounter = new Array(8).fill(0);

            if (lastFrameData) {
                for (let y = 0; y < canvas.height; y += 4) {
                    for (let x = 0; x < canvas.width; x += 4) {
                        circlesConfig.forEach((circle, idx) => {
                            let shouldScan = false;
                            if (gameLevel === 1 && idx === currentTargetZoneLvl1) shouldScan = true;
                            if (gameLevel === 2 && !circle.isCleared) shouldScan = true;

                            if (shouldScan) {
                                const dx = x - circle.x;
                                const dy = y - circle.y;
                                if (dx * dx + dy * dy < circle.radius * circle.radius) {
                                    const i = (y * canvas.width + x) * 4;
                                    const diffR = Math.abs(currentFrameData.data[i] - lastFrameData.data[i]);
                                    const diffG = Math.abs(currentFrameData.data[i+1] - lastFrameData.data[i+1]);
                                    const diffB = Math.abs(currentFrameData.data[i+2] - lastFrameData.data[i+2]);
                                    if (diffR + diffG + diffB > 75) motionCounter[idx]++;
                                }
                            }
                        });
                    }
                }
            }
            lastFrameData = currentFrameData;

            for (let i = 0; i < 8; i++) {
                const isValidTrigger = (gameLevel === 1 && i === currentTargetZoneLvl1) ||
                    (gameLevel === 2 && !circlesConfig[i].isCleared);
                if (isValidTrigger && motionCounter[i] > 10) {
                    activeTimers[i] = now + HOLD_DURATION;
                }
            }

            if (latestPoses && latestPoses.length > 0) {
                const pointsToDraw = [11, 12, 15, 16, 23, 24, 27, 28];
                pointsToDraw.forEach(index => {
                    const kp = latestPoses[index];
                    if (kp && kp.score > 0.4) {
                        ctx.beginPath();
                        ctx.arc(kp.x, kp.y, 13, 0, 2 * Math.PI);
                        ctx.strokeStyle = (index === 15 || index === 16) ? '#ff007f' : '#00f0ff'; 
                        ctx.lineWidth = 4;
                        ctx.stroke();
                    }
                });
            }

            circlesConfig.forEach((circle, i) => {
                let isTargetToShow = false;
                if (gameLevel === 1 && circle.id === currentTargetZoneLvl1) isTargetToShow = true;
                if (gameLevel === 2) isTargetToShow = true;

                if (isTargetToShow) {
                    const isHit = (gameLevel === 2 && circle.isCleared);
                    const isVisuallyActive = now < activeTimers[circle.id] || isHit;

                    ctx.save();
                    if (isHit) {
                        ctx.beginPath();
                        ctx.arc(circle.x, circle.y, circle.radius * 1.06, 0, 2 * Math.PI);
                        ctx.fillStyle = 'rgba(255, 221, 0, 0.85)';
                        ctx.fill();
                        ctx.strokeStyle = '#ffff00';
                        ctx.lineWidth = 6;
                        ctx.stroke();
                    } else {
                        if (now < activeTimers[circle.id]) {
                            if (gameLevel === 1) {
                                score += 10;
                                scoreVal.innerText = score;
                                playArcadeLaser(baseFrequencies[circle.id], true);
                                centerTaskText = "🌟 完美擊中！";
                                centerTextColor = "#00ff66";
                                centerTextScale = 1.5;
                                currentTargetZoneLvl1 = -1;
                                setTimeout(generateNewChallenge, 800);
                            } else {
                                if (circle.number === nextExpectedNumber) {
                                    circle.isCleared = true;
                                    score += 10;
                                    scoreVal.innerText = score;
                                    playArcadeLaser(baseFrequencies[circle.id], true);
                                    centerTaskText = `🌟 完美擊中：${nextExpectedNumber}！`;
                                    centerTextColor = "#00ff66";
                                    centerTextScale = 1.5;
                                    nextExpectedNumber++;
                                    if (nextExpectedNumber > 8) {
                                        nextExpectedNumber = 1;
                                        centerTaskText = "🔥 1-8 全連擊清場爆裂！ 🔥";
                                        setTimeout(generateNewChallenge, 800); 
                                    } else {
                                        setTimeout(() => {
                                            centerTaskText = `🔍 請尋找數字：${nextExpectedNumber}`;
                                            centerTextColor = "#ffff00";
                                            centerTextScale = 1.0;
                                            nextTaskTimestamp = Date.now() + targetLifeTime;
                                      }, 400);
                                    }
                                } else {
                                    if (!zoneStates[circle.id]) {
                                        zoneStates[circle.id] = true;
                                        playArcadeLaser(120, false);
                                    }
                                }
                            }
                        } else {
                            zoneStates[circle.id] = false;
                        }

                        ctx.beginPath();
                        ctx.arc(circle.x, circle.y, circle.radius, 0, 2 * Math.PI);
                        if (circle.type === 'hand') {
                            ctx.fillStyle = 'rgba(255, 0, 127, 0.22)';
                            ctx.strokeStyle = '#ff007f';
                        } else if (circle.type === 'side') {
                            ctx.fillStyle = 'rgba(0, 255, 102, 0.22)';
                            ctx.strokeStyle = '#00ff66';
                        } else {
                            ctx.fillStyle = 'rgba(0, 240, 255, 0.22)';
                            ctx.strokeStyle = '#00f0ff';
                        }
                        ctx.fill();
                        ctx.lineWidth = 4; ctx.stroke();
                    }

                    ctx.translate(circle.x, circle.y);
                    ctx.scale(-1, 1);
                    ctx.fillStyle = isVisuallyActive ? '#000000' : '#ffffff';
                    
                    // 根據縮放比率動態調整字體大小
                    const labelFontSize = Math.round(22 * globalZoomScale);
                    const numFontSize = Math.round(34 * globalZoomScale);
                    const subFontSize = Math.round(10 * globalZoomScale);

                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    if (gameLevel === 1) {
                        ctx.font = `bold ${labelFontSize}px system-ui, sans-serif`;
                        const labels = ["左上方", "正上方", "右上方", "左 邊", "右 邊", "左下方", "正下方", "右下方"];
                        ctx.fillText(labels[circle.id], 0, 0);
                    } else if (gameLevel === 2 && !circle.isCleared) {
                        ctx.font = `bold ${numFontSize}px system-ui, sans-serif`;
                        ctx.fillText(circle.number, 0, -3 * globalZoomScale);
                        ctx.font = `bold ${subFontSize}px system-ui`;
                        ctx.fillStyle = 'rgba(255,255,255,0.6)';
                        ctx.fillText(circle.labelName, 0, 20 * globalZoomScale);
                    }
                    ctx.restore();
                } else {
                    zoneStates[circle.id] = false;
                }
            });

            // 5. 中央提示字體（也同樣乘上 globalZoomScale 控制大小）
            ctx.save();
            ctx.translate(canvas.width * 0.5, canvas.height * 0.5);
            ctx.scale(-1 * centerTextScale, 1 * centerTextScale);

            ctx.fillStyle = centerTextColor;
            const centerFontSize = Math.round(36 * globalZoomScale);
            ctx.font = `bold ${centerFontSize}px Arial Black, system-ui, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.9)';
            ctx.lineWidth = Math.round(8 * globalZoomScale);
            ctx.strokeText(centerTaskText, 0, 0);
            ctx.fillText(centerTaskText, 0, 0);
            ctx.restore();

            requestAnimationFrame(renderLoop);
        }

        window.addEventListener('resize', () => {
            if(canvas.width > 0) updateCirclesLayout();
        });
    </script>
</body>
</html>
